name: Build and Deploy

on:
  push:
    branches: [ "main", "dev" ]

jobs:
  tests:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore PolytechPresence.sln

      - name: Run unit tests
        run: dotnet test backend.Tests/backend.Tests.csproj --configuration Release --no-restore --verbosity normal

  tests-front:
    name: Run Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: front

      - name: Run unit tests
        run: npm test
        working-directory: front

  build-and-deploy:
    name: Build and Deploy Containers
    needs: [tests, tests-front]
    if: ${{ needs.tests.result == 'success' && needs.tests-front.result == 'success' }}
    runs-on: [ "self-hosted" ]
    steps:
      - name: Build and start containers
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            cd /home/emargement/PolyPresence
          else
            cd /home/emargement/PolyPresence_preprod
          fi
          git fetch origin
          git reset --hard origin/${{ github.ref_name }}
          docker compose build
          docker compose up -d
