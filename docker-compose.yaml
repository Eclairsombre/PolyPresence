services:
    backend:
        build: backend
        restart: always
        env_file: backend/.env
        environment:
            - TZ=Europe/Paris
        networks:
            - app_network
        volumes:
            - ./backend_data:/data
        logging:
          driver: journald

    frontend:
        build:
            context: front
        restart: always
        depends_on:
            - backend
        environment:
            - TZ=Europe/Paris
        networks:
            - app_network
            - app_network_web
        logging:
          driver: journald

    cloudflared:
        image: cloudflare/cloudflared:latest
        command: tunnel --no-autoupdate run
        restart: always
        networks:
            - app_network_web
        environment:
            - "TUNNEL_TOKEN=${TUNNEL_TOKEN}"
            - TZ=Europe/Paris
        logging:
          driver: journald

    postgres:
        image: postgres:16
        restart: always
        environment:
            - POSTGRES_DB=polypresence
            - POSTGRES_USER=polypresence
            - POSTGRES_PASSWORD=polypresence
            - TZ=Europe/Paris
        volumes:
            - pgdata:/var/lib/postgresql/data
            - ./pg_conf/postgresql.conf:/etc/postgresql/postgresql.conf
        networks:
            - app_network
        ports:
            - "5432:5432"
        command: -c config_file=/etc/postgresql/postgresql.conf
        logging:
            driver: journald
networks:
    app_network:
        driver: bridge
    app_network_web:
        driver: bridge

volumes:
  pgdata: